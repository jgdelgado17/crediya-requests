server:
  port: 8081
spring:
  application:
    name: "crediya-requests"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
adapters:
  r2dbc:
    host: "${DB_HOST}"
    port: ${DB_PORT}
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    database: "${DB_DATABASE}"
    schema: "public"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS}"
adapter:
  restconsumer:
    timeout: 5000
    url: "${ADAPTER_RESTCONSUMER_URL}"
    uri-user-by-email: "${ADAPTER_RESTCONSUMER_URI_USER_BY_EMAIL}"
    uri-users-by-list-emails: "${ADAPTER_RESTCONSUMER_URI_USERS_BY_LIST_EMAILS}"
resilience4j:
  circuitbreaker:
    instances:
      validateEmailUser:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
