version: "3.9"

services:
  requests-db:
    image: postgres:15
    container_name: crediya-requests-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crediya_requests
    ports:
      - "5433:5432"
    volumes:
      - pg_requests_data:/var/lib/postgresql/data

volumes:
  pg_requests_data: